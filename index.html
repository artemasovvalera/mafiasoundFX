<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>МАФИЯ — Soundboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --card: #161616;
    --border: #2a2a2a;
    --red: #c0392b;
    --red-bright: #e74c3c;
    --red-glow: rgba(192,57,43,0.4);
    --gold: #c9a84c;
    --gold-dim: #8a6f2e;
    --text: #e8e0d0;
    --text-dim: #7a7060;
    --text-muted: #4a4540;
    --played: #2a2a2a;
    --played-text: #444;
    --active: #c0392b;
    --fx-bg: #1a0f0f;
    --fx-border: #3a1a1a;
    --header-h: 56px;
    --fx-h: 90px;
    --crossfade: 0.8s;
  }
  [data-theme="light"] {
    --bg: #f5f0e8;
    --bg2: #ede8de;
    --bg3: #e5dfd4;
    --card: #faf7f2;
    --border: #d0c8b8;
    --red: #a02020;
    --red-bright: #c0392b;
    --red-glow: rgba(160,32,32,0.2);
    --gold: #8a6010;
    --gold-dim: #b08030;
    --text: #1a1410;
    --text-dim: #6a6050;
    --text-muted: #aaa090;
    --played: #ddd8ce;
    --played-text: #aaa090;
    --active: #a02020;
    --fx-bg: #f0e8e8;
    --fx-border: #d0b8b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.005) 40px, rgba(255,255,255,0.005) 41px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: linear-gradient(180deg, #000 0%, var(--bg2) 100%);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.8);
  }

  #logo {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--gold);
    text-shadow: 0 0 20px var(--gold-dim);
    text-transform: uppercase;
    flex: 1;
  }
  #logo span {
    color: var(--red-bright);
    text-shadow: 0 0 15px var(--red-glow);
  }

  .header-btns {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .hbtn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
    touch-action: manipulation;
  }
  .hbtn:active { transform: scale(0.92); }
  .hbtn:hover { border-color: var(--gold-dim); }

  #dimBtn {
    font-size: 20px;
    padding: 6px 10px;
    position: relative;
  }
  #dimBtn.dimmed {
    background: var(--red);
    border-color: var(--red-bright);
    box-shadow: 0 0 12px var(--red-glow);
    animation: dimPulse 1.5s ease-in-out infinite;
  }
  @keyframes dimPulse {
    0%,100% { box-shadow: 0 0 8px var(--red-glow); }
    50% { box-shadow: 0 0 20px var(--red-glow), 0 0 40px var(--red-glow); }
  }

  /* ── MENU DROPDOWN ── */
  #menuWrap { position: relative; }

  #menuDropdown {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    min-width: 220px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.8);
    overflow: hidden;
    z-index: 200;
  }
  #menuDropdown.open { display: block; animation: menuIn 0.15s ease; }
  @keyframes menuIn {
    from { opacity: 0; transform: translateY(-8px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .menu-item {
    padding: 13px 18px;
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    letter-spacing: 1px;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
    touch-action: manipulation;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:hover, .menu-item:active { background: var(--bg3); }
  .menu-item .mi-icon { font-size: 18px; width: 24px; text-align: center; }

  .menu-label {
    padding: 8px 18px 4px;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* Volume slider */
  .vol-row {
    padding: 10px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .vol-row label {
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--text-dim);
    display: block;
    margin-bottom: 8px;
  }
  input[type=range] {
    width: 100%;
    accent-color: var(--red);
    cursor: pointer;
  }

  /* Crossfade selector */
  .cf-row {
    padding: 10px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .cf-row label {
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--text-dim);
    display: block;
    margin-bottom: 8px;
  }
  .cf-btns { display: flex; gap: 6px; }
  .cf-btn {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 5px 0;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    transition: all 0.2s;
    touch-action: manipulation;
  }
  .cf-btn.active {
    background: var(--red);
    border-color: var(--red-bright);
    color: #fff;
  }

  /* ── MAIN SCROLL AREA ── */
  #main {
    position: fixed;
    top: var(--header-h);
    bottom: var(--fx-h);
    left: 0; right: 0;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    z-index: 1;
  }

  /* ── COLUMNS ── */
  .columns {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    min-height: 100%;
  }

  .col {
    border-right: 1px solid var(--border);
    padding: 0 0 12px;
  }
  .col:last-child { border-right: none; }

  .col-header {
    position: sticky;
    top: 0;
    background: linear-gradient(180deg, var(--bg) 60%, transparent);
    padding: 10px 6px 8px;
    text-align: center;
    z-index: 10;
  }
  .col-title {
    font-family: 'Playfair Display', serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    line-height: 1.3;
    display: block;
  }
  .col-line {
    display: block;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin: 6px 4px 0;
  }

  .btn-grid {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 4px 5px;
  }

  /* ── SOUND BUTTONS ── */
  .sbtn {
    width: 100%;
    height: 36px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-family: 'Playfair Display', serif;
    font-size: clamp(12px, 3.5vw, 16px);
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.12s, box-shadow 0.2s, border-color 0.2s;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Shine overlay */
  .sbtn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Ripple */
  .sbtn::after {
    content: '';
    position: absolute;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transform: scale(0);
    opacity: 0;
    pointer-events: none;
    left: 50%; top: 50%;
    margin: -40px 0 0 -40px;
  }
  .sbtn.ripple::after {
    animation: ripple 0.4s ease-out;
  }
  @keyframes ripple {
    to { transform: scale(4); opacity: 0; }
  }

  .sbtn:active { transform: scale(0.93); }

  /* Played state */
  .sbtn.played {
    background: var(--played);
    border-color: var(--played);
    color: var(--played-text);
  }
  .sbtn.played::before { opacity: 0; }

  /* Playing state */
  .sbtn.playing {
    background: linear-gradient(135deg, #3a0808 0%, #1a0505 100%);
    border-color: var(--red-bright);
    color: #fff;
    box-shadow: 0 0 16px var(--red-glow), inset 0 0 20px rgba(192,57,43,0.15);
    animation: playingPulse 2s ease-in-out infinite;
  }
  @keyframes playingPulse {
    0%,100% { box-shadow: 0 0 12px var(--red-glow); }
    50% { box-shadow: 0 0 28px var(--red-glow), 0 0 50px rgba(192,57,43,0.2); }
  }

  /* Sound wave indicator on playing button */
  .sbtn.playing .wave {
    display: flex;
  }
  .wave {
    display: none;
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    gap: 2px;
    align-items: flex-end;
    height: 10px;
  }
  .wave span {
    width: 2px;
    background: var(--red-bright);
    border-radius: 1px;
    animation: waveBar 0.6s ease-in-out infinite alternate;
  }
  .wave span:nth-child(1) { height: 4px; animation-delay: 0s; }
  .wave span:nth-child(2) { height: 8px; animation-delay: 0.1s; }
  .wave span:nth-child(3) { height: 10px; animation-delay: 0.2s; }
  .wave span:nth-child(4) { height: 6px; animation-delay: 0.3s; }
  .wave span:nth-child(5) { height: 3px; animation-delay: 0.4s; }
  @keyframes waveBar {
    from { transform: scaleY(0.4); }
    to   { transform: scaleY(1); }
  }

  /* ── FX PANEL ── */
  #fxPanel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--fx-h);
    background: linear-gradient(0deg, #000 0%, var(--fx-bg) 100%);
    border-top: 1px solid var(--fx-border);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 10px 12px;
    gap: 10px;
    z-index: 100;
    box-shadow: 0 -4px 30px rgba(0,0,0,0.6);
  }

  .fx-btn {
    flex: 1;
    height: 58px;
    border-radius: 12px;
    border: 1px solid var(--fx-border);
    background: linear-gradient(135deg, #200808 0%, #120303 100%);
    font-size: clamp(22px, 7vw, 32px);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .fx-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .fx-btn:active {
    transform: scale(0.88);
    box-shadow: 0 0 20px var(--red-glow);
  }
  .fx-dim-btn {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: 2px solid var(--gold-dim);
    background: radial-gradient(circle at 40% 35%, #2a2000 0%, #0a0800 100%);
    color: var(--gold);
    font-size: 22px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 10px rgba(201,168,76,0.2);
  }
  .fx-dim-btn:active { transform: scale(0.88); }
  .fx-dim-btn.dimmed {
    background: radial-gradient(circle at 40% 35%, #1a0f00 0%, #0a0600 100%);
    border-color: var(--gold);
    box-shadow: 0 0 16px rgba(201,168,76,0.5), 0 0 30px rgba(201,168,76,0.2);
    animation: dimGoldPulse 1.5s ease-in-out infinite;
  }
  @keyframes dimGoldPulse {
    0%,100% { box-shadow: 0 0 10px rgba(201,168,76,0.4); }
    50%     { box-shadow: 0 0 24px rgba(201,168,76,0.7), 0 0 44px rgba(201,168,76,0.3); }
  }
    border-color: var(--gold);
    box-shadow: 0 0 18px var(--red-glow), 0 0 6px var(--gold-dim);
    background: linear-gradient(135deg, #3a1500 0%, #1a0800 100%);
    animation: fxPulse 1.5s ease-in-out infinite;
  }
  @keyframes fxPulse {
    0%,100% { box-shadow: 0 0 10px var(--red-glow); }
    50%     { box-shadow: 0 0 24px var(--red-glow), 0 0 40px rgba(192,57,43,0.2); }
  }
    border-color: var(--gold-dim);
    box-shadow: 0 0 16px var(--red-glow);
  }
  @keyframes fxFire {
    0%   { transform: scale(1); }
    30%  { transform: scale(0.85); }
    70%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  /* ── OVERLAY (menu close) ── */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 99;
  }
  #overlay.open { display: block; }

  /* Scrollbar */
  #main::-webkit-scrollbar { width: 3px; }
  #main::-webkit-scrollbar-track { background: transparent; }
  #main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Light theme adjustments */
  [data-theme="light"] .sbtn.playing {
    background: linear-gradient(135deg, #ffd0d0 0%, #ffb0b0 100%);
    color: #600;
  }
  [data-theme="light"] #header {
    background: linear-gradient(180deg, #e0d8cc 0%, var(--bg2) 100%);
  }
  [data-theme="light"] .fx-btn {
    background: linear-gradient(135deg, #f0d8d8 0%, #e8c8c8 100%);
  }
  [data-theme="light"] #fxPanel {
    background: linear-gradient(0deg, var(--bg2) 0%, var(--fx-bg) 100%);
  }
</style>
</head>
<body>

<!-- OVERLAY -->
<div id="overlay" onclick="closeMenu()"></div>

<!-- MOBILE UNLOCK BANNER -->
<div id="unlockBanner" style="
  display:none;
  position:fixed;
  top:56px;left:0;right:0;
  background:#c0392b;
  color:#fff;
  text-align:center;
  padding:8px 12px;
  font-family:'Cormorant Garamond',serif;
  font-size:13px;
  letter-spacing:1px;
  z-index:200;
  cursor:pointer;
" onclick="testAudio()">👆 Нажмите для активации звука</div>

<!-- ДИАГНОСТИКА -->
<div id="diagBox" style="
  display:none;
  position:fixed;
  top:100px;left:10px;right:10px;
  background:#000;
  color:#0f0;
  font-family:monospace;
  font-size:12px;
  padding:10px;
  border:1px solid #0f0;
  border-radius:8px;
  z-index:999;
  max-height:200px;
  overflow-y:auto;
  white-space:pre-wrap;
"></div>

<script>
  // Показываем баннер на всех устройствах для диагностики
  document.getElementById('unlockBanner').style.display = 'block';
</script>

<!-- HEADER -->
<div id="header">
  <div id="logo">М<span>А</span>ФИЯ</div>
  <div class="header-btns">
    <div id="menuWrap">
      <button class="hbtn" onclick="toggleMenu()">☰</button>
      <div id="menuDropdown">
        <div class="menu-label">Управление</div>
        <div class="menu-item" onclick="resetAll()">
          <span class="mi-icon">↺</span> Сбросить все кнопки
        </div>
        <div class="menu-item" onclick="toggleTheme()">
          <span class="mi-icon" id="themeIcon">☀️</span>
          <span id="themeLabel">Светлая тема</span>
        </div>
        <div class="vol-row">
          <label>🔉 Громкость: <span id="volVal">80</span>%</label>
          <input type="range" id="volSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
        </div>
        <div class="cf-row">
          <label>⏱ Crossfade</label>
          <div class="cf-btns">
            <button class="cf-btn" onclick="setCF(0.3, this)">0.3с</button>
            <button class="cf-btn active" onclick="setCF(0.8, this)">0.8с</button>
            <button class="cf-btn" onclick="setCF(1.5, this)">1.5с</button>
            <button class="cf-btn" onclick="setCF(2.5, this)">2.5с</button>
          </div>
        </div>
        <div class="menu-item" onclick="stopAll(); closeMenu()">
          <span class="mi-icon">⏹</span> Остановить всё
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="columns">
    <!-- COL 1: 1-8 -->
    <div class="col">
      <div class="col-header">
        <span class="col-title">Слова<br>ведущего</span>
        <span class="col-line"></span>
      </div>
      <div class="btn-grid" id="col1"></div>
    </div>
    <!-- COL 2: 21-28 -->
    <div class="col">
      <div class="col-header">
        <span class="col-title">Ночь<br>музыка</span>
        <span class="col-line"></span>
      </div>
      <div class="btn-grid" id="col2"></div>
    </div>
    <!-- COL 3: 31-38 -->
    <div class="col">
      <div class="col-header">
        <span class="col-title">Обсуж-<br>дение</span>
        <span class="col-line"></span>
      </div>
      <div class="btn-grid" id="col3"></div>
    </div>
  </div>
</div>

<!-- FX PANEL -->
<div id="fxPanel">
  <button class="fx-btn" onclick="playFX(51, this)" title="Аплодисменты">👏</button>
  <button class="fx-btn" onclick="playFX(52, this)" title="Неудача">🚽</button>
  <button class="fx-dim-btn" id="dimBtn" onclick="toggleDim()" title="Приглушить">🔊</button>
  <button class="fx-btn" onclick="playFX(53, this)" title="Смешной смех">😂</button>
  <button class="fx-btn" onclick="playFX(54, this)" title="Барабанная дробь">🥁</button>
</div>

<script>
// ── ДИАГНОСТИКА ──
function diag(msg) {
  const box = document.getElementById('diagBox');
  if (box) { box.style.display = 'block'; box.textContent += msg + '\n'; }
  console.log(msg);
}

function testAudio() {
  diag('--- ТЕСТ ---');
  diag('UA: ' + navigator.userAgent.substring(0,80));
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    diag('AudioContext: ' + ctx.state);
    ctx.resume().then(() => diag('resume OK'));
  } catch(e) { diag('AudioContext ERR: ' + e.message); }
  try {
    const a = new Audio('11.mp3');
    a.volume = 1.0;
    const p = a.play();
    if (p) {
      p.then(() => {
        diag('11.mp3: ИГРАЕТ ✓');
        document.getElementById('unlockBanner').style.display = 'none';
      }).catch(e => diag('PLAY ERR: ' + e.name + ' ' + e.message));
    }
  } catch(e) { diag('Audio ERR: ' + e.message); }
}

// ── AUDIO UNLOCK ──
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    ctx.resume();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
  } catch(e) {}
}
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('click', unlockAudio, { once: true });

// ── STATE ──
let currentAudio = null;
let currentBtn   = null;
let masterVolume = 0.8;
let crossfadeDur = 0.8;   // seconds
let isDimmed     = false;
let preAtten     = 1.0;    // volume before dim
const playedSet  = new Set();

// ── BUILD BUTTONS ──
function buildCol(containerId, numbers) {
  const wrap = document.getElementById(containerId);
  numbers.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'sbtn';
    btn.id = 'btn_' + n;
    btn.dataset.track = n;
    btn.innerHTML = n + '<div class="wave"><span></span><span></span><span></span><span></span><span></span></div>';
    btn.addEventListener('click', () => handlePlay(n, btn));
    wrap.appendChild(btn);
  });
}

buildCol('col1', [11,12,13,14,15,16,17,18]);
buildCol('col2', [21,22,23,24,25,26,27,28]);
buildCol('col3', [31,32,33,34,35,36,37,38]);

// ── PLAY / CROSSFADE ──
function handlePlay(trackNum, btn) {
  // Ripple
  btn.classList.remove('ripple');
  void btn.offsetWidth;
  btn.classList.add('ripple');

  // If this track is already playing — stop it
  if (currentAudio && currentBtn === btn) {
    fadeOut(currentAudio, crossfadeDur);
    currentAudio = null;
    currentBtn.classList.remove('playing');
    currentBtn = null;
    return;
  }

  const file = trackNum + '.mp3';
  const newAudio = new Audio(file);
  newAudio.volume = 0;
  newAudio.loop = true;

  // Fade out old
  if (currentAudio) {
    fadeOut(currentAudio, crossfadeDur);
    currentBtn.classList.remove('playing');
    currentBtn.classList.add('played');
    playedSet.add(currentBtn.dataset.track);
  }

  // Switch state
  if (currentBtn) currentBtn.classList.remove('playing');
  btn.classList.remove('played');
  btn.classList.add('playing');
  currentBtn  = btn;
  currentAudio = newAudio;
  playedSet.add(String(trackNum));

  newAudio.play().then(() => {
    fadeIn(newAudio, crossfadeDur);
  }).catch(e => {
    // File not found — still mark as played
    console.warn('Audio not found:', file);
    btn.classList.remove('playing');
    btn.classList.add('played');
    if (currentAudio === newAudio) { currentAudio = null; currentBtn = null; }
  });

  newAudio.addEventListener('ended', () => {
    if (currentAudio === newAudio) {
      currentAudio = null;
      currentBtn = null;
    }
    btn.classList.remove('playing');
    btn.classList.add('played');
  });
}

function fadeIn(audio, dur) {
  const target = isDimmed ? masterVolume * 0.2 : masterVolume;
  const steps = 30;
  const step = target / steps;
  const interval = (dur * 1000) / steps;
  let v = 0;
  const t = setInterval(() => {
    v = Math.min(v + step, target);
    audio.volume = v;
    if (v >= target) clearInterval(t);
  }, interval);
}

function fadeOut(audio, dur) {
  const start = audio.volume;
  const steps = 30;
  const step = start / steps;
  const interval = (dur * 1000) / steps;
  const t = setInterval(() => {
    audio.volume = Math.max(audio.volume - step, 0);
    if (audio.volume <= 0) {
      clearInterval(t);
      audio.pause();
    }
  }, interval);
}

// ── FX ──
// FX state map: button element → Audio
const fxPlaying = new Map();

function playFX(num, btn) {
  // If already playing — fade out and stop
  if (fxPlaying.has(btn)) {
    const fx = fxPlaying.get(btn);
    fxPlaying.delete(btn);
    btn.classList.remove('fx-on');
    fadeFXOut(fx, 0.2);
    return;
  }

  // Ripple
  btn.classList.remove('firing');
  void btn.offsetWidth;
  btn.classList.add('firing');
  setTimeout(() => btn.classList.remove('firing'), 400);

  const fx = new Audio(num + '.mp3');
  fx.volume = 0;
  fxPlaying.set(btn, fx);
  btn.classList.add('fx-on');

  fx.play().then(() => {
    fadeFXIn(fx, 0.2);
  }).catch(() => {
    fxPlaying.delete(btn);
    btn.classList.remove('fx-on');
  });

  fx.addEventListener('ended', () => {
    fxPlaying.delete(btn);
    btn.classList.remove('fx-on');
  });
}

function fadeFXIn(audio, dur) {
  const target = Math.min(masterVolume * 1.5, 1.0);
  const steps = 20;
  const interval = (dur * 1000) / steps;
  let v = 0;
  const t = setInterval(() => {
    v = Math.min(v + target / steps, target);
    audio.volume = v;
    if (v >= target) clearInterval(t);
  }, interval);
}

function fadeFXOut(audio, dur) {
  const start = audio.volume;
  const steps = 20;
  const interval = (dur * 1000) / steps;
  const t = setInterval(() => {
    audio.volume = Math.max(audio.volume - start / steps, 0);
    if (audio.volume <= 0) {
      clearInterval(t);
      audio.pause();
    }
  }, interval);
}

// ── DIM ──
function toggleDim() {
  const dimBtn = document.getElementById('dimBtn');
  if (!isDimmed) {
    isDimmed = true;
    preAtten = masterVolume;
    dimBtn.textContent = '🔈';
    dimBtn.classList.add('dimmed');
    if (currentAudio) smoothVolume(currentAudio, masterVolume * 0.2, 0.5);
  } else {
    isDimmed = false;
    dimBtn.textContent = '🔊';
    dimBtn.classList.remove('dimmed');
    if (currentAudio) smoothVolume(currentAudio, masterVolume, 0.5);
  }
}

function smoothVolume(audio, target, dur) {
  const start = audio.volume;
  const diff = target - start;
  const steps = 20;
  const interval = (dur * 1000) / steps;
  let i = 0;
  const t = setInterval(() => {
    i++;
    audio.volume = Math.max(0, Math.min(1, start + diff * (i / steps)));
    if (i >= steps) clearInterval(t);
  }, interval);
}

// ── VOLUME ──
function setVolume(val) {
  masterVolume = val / 100;
  document.getElementById('volVal').textContent = val;
  if (currentAudio && !isDimmed) {
    currentAudio.volume = masterVolume;
  }
}

// ── CROSSFADE ──
function setCF(val, btn) {
  crossfadeDur = val;
  document.querySelectorAll('.cf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── RESET ──
function resetAll() {
  playedSet.clear();
  document.querySelectorAll('.sbtn').forEach(b => {
    b.classList.remove('played', 'playing');
  });
  closeMenu();
}

// ── STOP ALL ──
function stopAll() {
  if (currentAudio) {
    fadeOut(currentAudio, crossfadeDur);
    currentAudio = null;
  }
  if (currentBtn) {
    currentBtn.classList.remove('playing');
    currentBtn.classList.add('played');
    currentBtn = null;
  }
}

// ── THEME ──
function toggleTheme() {
  const html  = document.documentElement;
  const icon  = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if (html.dataset.theme === 'dark') {
    html.dataset.theme = 'light';
    icon.textContent  = '🌙';
    label.textContent = 'Тёмная тема';
  } else {
    html.dataset.theme = 'dark';
    icon.textContent  = '☀️';
    label.textContent = 'Светлая тема';
  }
  closeMenu();
}

// ── MENU ──
function toggleMenu() {
  const dd = document.getElementById('menuDropdown');
  const ov = document.getElementById('overlay');
  dd.classList.toggle('open');
  ov.classList.toggle('open');
}
function closeMenu() {
  document.getElementById('menuDropdown').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── TOUCH FIX FOR MOBILE ──
// Убираем задержку 300ms на мобильных через touchstart→click
function addTouchClick(el, fn) {
  let moved = false;
  el.addEventListener('touchstart', () => { moved = false; }, { passive: true });
  el.addEventListener('touchmove',  () => { moved = true;  }, { passive: true });
  el.addEventListener('touchend', e => {
    if (!moved) { e.preventDefault(); fn(e); }
  }, { passive: false });
  el.addEventListener('click', fn);
}
